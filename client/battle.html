<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>五教科バトル - バトル</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="battle-container">
<header class="battle-header"><h1>バトル</h1><p id="turnText" class="turn-text"></p></header>
<div class="players">
<div class="card player-card" id="playerCard"><p class="card-label">あなた</p><h2 id="myName">----</h2>
<div id="myDamage" class="damage"></div><div class="hpbar"><div id="myHPBar" class="fill"></div></div>
<p id="myHPText" class="hp-text">HP 100 / 100</p>
<div class="stats"><p id="myAtk">攻撃：-</p><p id="mySp">特殊：-</p>
<p id="myDef">防御：-</p><p id="mySpeed">速さ：-</p></div></div>
<div class="vs">VS</div>
<div class="card enemy-card" id="enemyCard"><p class="card-label">相手</p><h2 id="enemyName">読込中...</h2>
<div id="enemyDamage" class="damage"></div><div class="hpbar"><div id="enemyHPBar" class="fill enemy"></div></div>
<p id="enemyHPText" class="hp-text">HP ???</p>
<div class="stats"><p id="enemyAtk">攻撃：？</p><p id="enemySp">特殊：？</p>
<p id="enemyDef">防御：？</p><p id="enemySpeed">速さ：？</p></div></div></div>
<div class="ultimate-section"><p class="gauge-label">必殺技ゲージ</p>
<div class="ultimateGauge"><div id="ultimateGaugeBar" class="ultimateFill"></div></div></div>
<div class="commands">
<button type="button" id="attackBtn" class="cmd-btn attack">攻撃</button>
<button type="button" id="specialBtn" class="cmd-btn special">特殊</button>
<button type="button" id="guardBtn" class="cmd-btn guard">防御</button>
<button type="button" id="ultimateBtn" class="cmd-btn ultimate" disabled>必殺技</button></div>
<div id="log" class="battle-log">戦闘開始！</div></div>
<script src="/socket.io/socket.io.js"></script>
<script src="js/i18n.js"></script>
<script src="js/battle.js"></script>
</body>
</html>
