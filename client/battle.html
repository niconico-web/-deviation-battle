<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Battle - Battle</title>
    <link rel="stylesheet" href="css/battle.css">
</head>

<body>

<div class="battle-container">

    <h1>? School Battle</h1>

    <div class="players">

        <div class="card" id="playerCard">

            <h2>궇궶궫</h2>

            <h3 id="myName">----</h3>

            <div id="myDamage" class="damage"></div>

            <div class="hpbar">
                <div id="myHPBar" class="fill"></div>
            </div>

            <p id="myHPText">HP 100 / 100</p>

            <div class="stats">
                <p id="myAtk">뛘똼갌-</p>
                <p id="mySp">벫롪갌-</p>
                <p id="myDef">뻞뚥갌-</p>
                <p id="mySpeed">뫊궠갌-</p>
            </div>

        </div>

        <div class="vs">VS</div>

        <div class="card" id="enemyCard">

            <h2>몜롨</h2>

            <h3 id="enemyName">벶뜛뭷...</h3>

            <div class="hpbar">
                <div id="enemyHPBar" class="fill enemy"></div>
            </div>

            <p id="enemyHPText">HP ???</p>

            <div class="stats">
                <p id="enemyAtk">뛘똼갌갎</p>
                <p id="enemySp">벫롪갌갎</p>
                <p id="enemyDef">뻞뚥갌갎</p>
                <p id="enemySpeed">뫊궠갌갎</p>
            </div>

            <div id="enemyDamage" class="damage"></div>

        </div>

    </div>

    <div class="ultimateGauge">
        <div id="ultimateGaugeBar" class="ultimateFill"></div>
    </div>

    <div id="turnText"></div>

    <div class="commands">
        <button id="attackBtn">? 뛘똼</button>
        <button id="specialBtn">? 벫롪</button>
        <button id="guardBtn">? 뻞뚥</button>
        <button id="ultimateBtn" disabled>? 뷠랤땆</button>
    </div>

    <div id="log">먰벉둎럑갏</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/battle.js"></script>

</body>
</html>
