<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>School Battle</title>
<link rel="stylesheet" href="css/style.css?v=1783932440567">
</head>
<body>
<div id="app">
<header class="page-header">
    <h1>School Battle</h1>
    <p class="subtitle" id="subtitle"></p>
</header>

<section class="section">
    <label class="field-label" for="playerName" id="playerNameLabel"></label>
    <input id="playerName" type="text" placeholder="" autocomplete="nickname">
</section>

<section class="section">
    <h2 id="statAllocationTitle"></h2>
    <p class="stat-allocation-desc" id="statAllocationDesc"></p>
    <p id="remainingPoints" class="remaining-points"></p>

    <div class="stat-allocation">
        <label>HP
            <input id="statMaxHp" type="number" value="60" min="10" max="280">
        </label>

        <label id="atkLabel">
            <span id="atkLabelText"></span>
            <input id="statAtk" type="number" value="60" min="10" max="280">
        </label>

        <label id="spLabel">
            <span id="spLabelText"></span>
            <input id="statSp" type="number" value="60" min="10" max="280">
        </label>

        <label id="defLabel">
            <span id="defLabelText"></span>
            <input id="statDef" type="number" value="60" min="10" max="280">
        </label>

        <label id="speedLabel">
            <span id="speedLabelText"></span>
            <input id="statSpeed" type="number" value="60" min="10" max="280">
        </label>
    </div>

    <button type="button" class="btn btn-primary" id="createCharBtn" onclick="createCharacter()"></button>
</section>

<section class="study-section section">
    <h2 id="studyTimerTitle"></h2>

    <p class="study-desc" id="studyDesc"></p>

    <label class="field-label" for="studyFocus" id="studyFocusLabel"></label>

    <select id="studyFocus">
        <option value="jp" id="jpOpt"></option>
        <option value="math" id="mathOpt"></option>
        <option value="eng" id="engOpt"></option>
        <option value="sci" id="sciOpt"></option>
        <option value="soc" id="socOpt"></option>
    </select>

    <div id="studyTimer" class="study-timer">00:00:00</div>

    <button type="button" class="btn" id="studyStart" onclick="startStudy()"></button>
    <button type="button" class="btn" id="studyStop" onclick="stopStudy()" disabled></button>
</section>

<section id="status" class="status-section"></section>
<section id="xpDisplay" class="xp-section"></section>

<section class="online-section section">
    <h2 id="onlineTitle"></h2>
    
    <button type="button" class="btn" id="createRoom"></button>
    
    <div id="joinSection">
        <label for="roomInput" id="roomCodeLabel"></label>
        <input id="roomInput" type="text" placeholder="6ĢČÄÜé╠āRü[āh">
        <button type="button" class="btn" id="joinRoom"></button>
    </div>
</section>

<section id="playerDataSection" class="player-data-section">
    <button type="button" class="btn btn-danger" id="deletePlayerBtn" onclick="deletePlayer()"></button>
</section>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/i18n.js?v=1783932440567"></script>
<script src="js/stats.js?v=1783932440567"></script>
<script src="js/script.js?v=1783932440567"></script>
</body>
</html>
