<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Battle</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<h1>? School Battle</h1>

<input id="playerName" placeholder="プレイヤー名">

<h2>偏差値</h2>

<div class="subjects">

<label>国語
<input id="jp" type="number" value="50" min="30" max="80" step="0.01">
</label>

<label>数学
<input id="math" type="number" value="50" min="30" max="80" step="0.01">
</label>

<label>英語
<input id="eng" type="number" value="50" min="30" max="80" step="0.01">
</label>

<label>理科
<input id="sci" type="number" value="50" min="30" max="80" step="0.01">
</label>

<label>社会
<input id="soc" type="number" value="50" min="30" max="80" step="0.01">
</label>

</div>

<button onclick="createCharacter()">
キャラクター作成
</button>

<div id="status">

<h2>ステータス</h2>
<p>まだキャラクターが作成されていません。</p>

</div>

<div class="study-section">

<h2>? 勉強タイマー</h2>

<p class="study-desc">勉強時間が長いほど経験値が増えます。強化科目に応じて偏差値がわずかに上昇します。</p>

<label>強化する科目
<select id="studyFocus">
<option value="jp">国語（HP・防御）</option>
<option value="math">数学（攻撃・速さ）</option>
<option value="eng">英語（特殊・速さ）</option>
<option value="sci">理科（攻撃・特殊）</option>
<option value="soc">社会（HP・防御）</option>
</select>
</label>

<p id="studyTimer" class="study-timer">00:00:00</p>
<p id="xpDisplay" class="xp-display">経験値：0</p>

<div class="study-buttons">
<button id="studyStart">勉強開始</button>
<button id="studyStop" disabled>勉強終了</button>
</div>

</div>

<div class="buttons">

<button id="createRoom">ルーム作成</button>

<input
    id="roomInput"
    type="text"
    placeholder="ルームコードを入力"
    maxlength="6"
>

<button id="joinRoom">ルーム参加</button>

<button id="deletePlayer" class="danger-btn">? プレイヤー削除</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/stats.js"></script>
<script src="js/script.js"></script>

</body>
</html>
